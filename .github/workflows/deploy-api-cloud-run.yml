name: Deploy API to Cloud Run

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: Optional image tag. Defaults to the commit SHA.
        required: false
        type: string

permissions:
  contents: read
  id-token: write

env:
  GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  GCP_REGION: ${{ vars.GCP_REGION || 'europe-west1' }}
  CLOUD_RUN_SERVICE: ${{ vars.CLOUD_RUN_SERVICE || 'maliyet-api' }}
  ARTIFACT_REGISTRY_REPOSITORY: ${{ vars.ARTIFACT_REGISTRY_REPOSITORY || 'maliyet-app' }}

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install API dependencies
        working-directory: apps/api
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile API
        working-directory: apps/api
        run: python -m compileall app

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOY_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Configure Docker auth
        run: gcloud auth configure-docker "${{ env.GCP_REGION }}-docker.pkg.dev" --quiet

      - name: Build and push image
        id: image
        working-directory: apps/api
        env:
          IMAGE_TAG: ${{ inputs.image_tag || github.sha }}
        run: |
          IMAGE_URI="${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${ARTIFACT_REGISTRY_REPOSITORY}/${CLOUD_RUN_SERVICE}:${IMAGE_TAG}"
          docker build -t "${IMAGE_URI}" .
          docker push "${IMAGE_URI}"
          echo "uri=${IMAGE_URI}" >> "$GITHUB_OUTPUT"

      - name: Deploy Cloud Run service
        run: |
          gcloud run deploy "${CLOUD_RUN_SERVICE}" \
            --image="${{ steps.image.outputs.uri }}" \
            --region="${GCP_REGION}" \
            --project="${GCP_PROJECT_ID}" \
            --platform=managed \
            --allow-unauthenticated \
            --port=8080 \
            --set-env-vars="BOMAKSAN_API_ENV=prod,BOMAKSAN_ALLOWED_ORIGINS=${{ vars.BOMAKSAN_ALLOWED_ORIGINS }}" \
            --set-secrets="BOMAKSAN_DATABASE_URL=${{ secrets.BOMAKSAN_DATABASE_URL_SECRET }}:latest,BOMAKSAN_TOKEN_SECRET=${{ secrets.BOMAKSAN_TOKEN_SECRET_SECRET }}:latest"

      - name: Health check
        run: |
          SERVICE_URL="$(gcloud run services describe "${CLOUD_RUN_SERVICE}" --region="${GCP_REGION}" --project="${GCP_PROJECT_ID}" --format='value(status.url)')"
          curl --fail "${SERVICE_URL}/health"
